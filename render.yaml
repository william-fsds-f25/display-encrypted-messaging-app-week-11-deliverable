services:
  # Backend API Service
  - type: web
    name: encrypted-messaging-backend
    runtime: node
    repo: https://github.com/william-fsds-f25/display-encrypted-messaging-app-week-11-deliverable
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: static
    name: encrypted-messaging-frontend
    runtime: static
    repo: https://github.com/william-fsds-f25/display-encrypted-messaging-app-week-11-deliverable
    plan: free
    region: oregon
    rootDir: frontend/public
    buildCommand: echo "No build needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
